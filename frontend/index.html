<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawFlow - AI Legal Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <i class="fa-solid fa-scale-balanced logo-icon"></i>
            <div>
                <h1 class="brand-name">LawFlow</h1>
                <p class="brand-sub">AI Legal Assistant</p>
            </div>
        </div>
        <div class="nav-right">
            <i class="fa-solid fa-house nav-icon"></i>
            <div class="notification-badge">
                <i class="fa-solid fa-bell nav-icon"></i>
                <span class="badge">3</span>
            </div>
            <div class="profile-avatar"></div>
        </div>
    </div>

    <div class="chat-wrapper">
        <div class="chat-container" id="chat-container">
            
            <div class="message-row bot">
                <div class="icon-avatar bot-icon">
                    <i class="fa-regular fa-lightbulb"></i>
                </div>
                <div class="message-content">
                    <div class="sender-name">AI Assistant</div>
                    <div class="message-bubble">
                        Hello! I'm your AI Legal Assistant. How can I help you today?
                    </div>
                    <div class="message-time">09:24 AM</div>
                </div>
            </div>

        </div>

        <div class="suggestions-section" id="suggestions-section">
            <div class="suggestions-header">
                <i class="fa-regular fa-lightbulb"></i> Quick Suggestions
            </div>
            <div class="suggestions-grid">
                <div class="suggestion-chip" onclick="useSuggestion('Draft a civil suit petition')">Draft a civil suit petition</div>
                <div class="suggestion-chip" onclick="useSuggestion('Required documents for property dispute')">Required documents for property dispute</div>
                <div class="suggestion-chip" onclick="useSuggestion('Family law case filing procedure')">Family law case filing procedure</div>
                <div class="suggestion-chip" onclick="useSuggestion('Appeal application guidance')">Appeal application guidance</div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box-wrapper">
                <input type="text" id="user-input" placeholder="Ask about legal procedures, documents, or case guidance..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
